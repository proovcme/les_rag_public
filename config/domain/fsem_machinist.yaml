# Справочник ФСЭМ: машина → машинист (ОТм/ЗПМ). Редактируемое знание, не код.
#
# Зачем: агрегированная позиция «оплата труда машинистов» в норме ГЭСН не несёт кода ресурса —
# её выделяют в ЭМ по коду МАШИНЫ. Этот справочник связывает код машины с ресурсом-машинистом.
#
# Поля записи:
#   machinist_code — код ресурса-машиниста (ОТм)
#   machinist_name — наименование (несёт разряд, напр. «машинист 6,0»)
#   grade          — разряд (опц., для будущего обогащения из ФСЭМ)
#   tariff         — часовая тарифная ставка, руб. (опц.; пусто = берётся из цены ресурса)
#
# Дополнять записями из ФСЭМ по мере необходимости (код машины → машинист).
machines:
  "91.05.05-015":
    machinist_code: "4-100-060"
    machinist_name: "ОТм: кран на автомобильном ходу 16 т, машинист 6,0"
    grade: 6.0
  "91.14.02-001":
    machinist_code: "4-100-040"
    machinist_name: "ОТм: автомобиль бортовой, машинист 4,0"
    grade: 4.0
  "91.14.02-002":
    machinist_code: "4-100-040"
    machinist_name: "ОТм: автомобиль бортовой до 8 т, машинист 4,0"
    grade: 4.0
