# НР (накладные расходы, Приказ Минстроя 812/пр) и СП (сметная прибыль, 774/пр) по ВИДАМ РАБОТ,
# % от ФОТ. Норма ГЭСН их НЕ несёт — присваиваются по виду работ. Сопоставление — по ключевым словам
# наименования нормы (или по шифру-префиксу сборника).
#
# СЕМЯ: проверенное (Кровли — сверено на эталоне) + ДЕФОЛТ-плейсхолдер. Полная таблица из Приказов
# 812/774 (есть в StroiDocs RTF) — заполняется отдельно (агент). Значения с пометкой ПРОВЕРИТЬ — не финал.
#
# Знание ≠ веса: правится здесь.
version: 1

# Когда вид работ не распознан — дефолт (общестроительные). ПЛЕЙСХОЛДЕР, уточнить по Приказам.
default:
  label: "общестроительные (по умолчанию)"
  nr_pct: 95      # ПРОВЕРИТЬ по Приказу 812/пр
  sp_pct: 50      # ПРОВЕРИТЬ по Приказу 774/пр

# Ставка ОТм машинистов по умолчанию (руб/чел-ч) — когда норма даёт агрегат «Затраты труда
# машинистов» без разряда (нет кода в ФГИС ЦС). ПЛЕЙСХОЛДЕР, уточнить тарифом по разряду.
machinist_rate_default: 0   # 0 = не подставлять (флаг «нет цены»); задать >0 чтобы оценивать

works:
  # Кровли — сверено на эталоне (медный отлив/обрешётка): НР 109%, СП 57%.
  - label: "Кровли"
    match: ["кровл", "обреш", "отлив", "фальц"]
    nr_pct: 109
    sp_pct: 57
    basis: "Пр/812-012.0-1 (НР), Пр/774-012.0 (СП)"
