# НР (накладные расходы, Приказ Минстроя 812/пр) и СП (сметная прибыль, 774/пр) по ВИДАМ РАБОТ,
# % от ФОТ. Норма ГЭСН их НЕ несёт — присваиваются по виду работ. Сопоставление — по ключевым словам
# наименования нормы (или по шифру-префиксу сборника).
#
# ИСТОЧНИКИ (значения взяты из официальных Приказов, НЕ выдуманы):
#   НР — Приказ Минстроя РФ от 21.12.2020 N 812/пр (ред. 636/пр, 611/пр), Приложение «НОРМАТИВЫ
#        НАКЛАДНЫХ РАСХОДОВ ПО ВИДАМ РАБОТ». Берётся графа «Территория» (базовая, не МПРКС/РКС).
#   СП — Приказ Минстроя РФ от 11.12.2020 N 774/пр (ред. 317/пр), Приложение «НОРМАТИВЫ СМЕТНОЙ
#        ПРИБЫЛИ ПО ВИДАМ РАБОТ».
# Виды работ сопоставлены по номеру сборника ГЭСН (1..47 строительные) — он одинаков в обоих Приказах.
# basis: «Пр/812-<п.п.>, Пр/774-<п.п.>» — номер строки таблицы (N п/п) соответствующего Приказа.
#
# Кровли — дополнительно сверено на эталоне (медный отлив/обрешётка): НР 109%, СП 57% (совпало с Приказом).
#
# Знание ≠ веса: правится здесь.
version: 1

# Когда вид работ не распознан — дефолт. Принят по «Отделочным работам» (сборник 15, наиболее частый
# общестроительный вид): НР 100% / СП 49%. Это не «выдуманный» плейсхолдер, а реальная ставка из Приказов.
default:
  label: "общестроительные (по Отделочным работам, сб. 15)"
  nr_pct: 100     # Пр/812-15 (Отделочные работы, графа «Территория»)
  sp_pct: 49      # Пр/774-15 (Отделочные работы)

# Ставка ОТм машинистов по умолчанию (руб/чел-ч) — когда норма даёт агрегат «Затраты труда
# машинистов» без разряда (нет кода в ФГИС ЦС). ПЛЕЙСХОЛДЕР, уточнить тарифом по разряду.
machinist_rate_default: 0   # 0 = не подставлять (флаг «нет цены»); задать >0 чтобы оценивать

# Порядок важен: первый вид с совпавшим ключевым словом выигрывает. Ключевые слова подобраны
# непересекающимися; где есть риск пересечения — комментарий.
works:
  # --- I. Строительные работы (сборники ГЭСН 81-02-NN) ---

  - label: "Земляные работы"
    match: ["земляные работ", "разработка грунта", "выемка грунта", "котлован", "обратная засыпк", "рытьё", "рытье траншей"]
    nr_pct: 92      # п.1.1 механизированным способом (наиболее частый)
    sp_pct: 46
    basis: "Пр/812-1.1, Пр/774-1.1"

  - label: "Свайные работы"
    match: ["свайн", "сваи", "погружение свай", "опускн", "закрепление грунт"]
    nr_pct: 117     # п.5.1 свайные работы
    sp_pct: 70
    basis: "Пр/812-5.1, Пр/774-5.1"

  - label: "Бетонные и ж/б монолитные конструкции"
    match: ["монолитн", "бетонировани", "опалубк", "армировани", "арматур", "бетонная смесь", "укладка бетон"]
    nr_pct: 102     # п.6 (за искл. 6.1, 6.2)
    sp_pct: 58
    basis: "Пр/812-6, Пр/774-6"

  - label: "Бетонные и ж/б сборные конструкции"
    match: ["сборн", "монтаж плит", "монтаж панел", "монтаж колонн", "монтаж ригел", "сборные конструкц"]
    nr_pct: 110     # п.7 (за искл. 7.1, 7.2)
    sp_pct: 73
    basis: "Пр/812-7, Пр/774-7"

  - label: "Конструкции из кирпича и блоков"
    # «кладк» НЕ берём целиком — ловит «проКЛАДКа труб»; только кирпичная/каменная кладка.
    match: ["кирпич", "кирпичн кладк", "каменн кладк", "из блоков", "перегородк из"]
    nr_pct: 110     # п.8
    sp_pct: 69
    basis: "Пр/812-8, Пр/774-8"

  - label: "Строительные металлоконструкции"
    match: ["металлоконструкц", "металлическ конструкц", "монтаж металлоконструкц", "стальн конструкц", "балк", "ферм"]
    nr_pct: 93      # п.9 (за искл. 9.1)
    sp_pct: 62
    basis: "Пр/812-9, Пр/774-9"

  - label: "Деревянные конструкции"
    # «брус/брусков» НЕ берём — «обрешётка из брусков» = Кровли (сб.12); ловим стропила/пиломатериал.
    match: ["деревянн конструкц", "стропил", "пиломатериал", "дощат", "из бревен", "из брёвен"]
    nr_pct: 108     # п.10
    sp_pct: 55
    basis: "Пр/812-10, Пр/774-10"

  - label: "Полы"
    match: ["устройство полов", "стяж", "покрытие пол", "линолеум", "плитк пол", "наливн пол", "паркет"]
    nr_pct: 112     # п.11
    sp_pct: 65
    basis: "Пр/812-11, Пр/774-11"

  # Кровли — сверено на эталоне (медный отлив/обрешётка) И в Приказах: НР 109%, СП 57%.
  - label: "Кровли"
    match: ["кровл", "обреш", "отлив", "фальц"]
    nr_pct: 109     # п.12
    sp_pct: 57
    basis: "Пр/812-12, Пр/774-12"

  - label: "Защита конструкций от коррозии"
    match: ["антикоррозион", "от коррозии", "огнезащит", "грунтовк металл", "окраск металл"]
    nr_pct: 94      # п.13
    sp_pct: 51
    basis: "Пр/812-13, Пр/774-13"

  - label: "Отделочные работы"
    match: ["отделочн", "штукатур", "шпатлёвк", "шпатлевк", "шпаклёвк", "шпаклевк", "облицовк", "окраск", "оклейк обо", "обои", "малярн"]
    nr_pct: 100     # п.15
    sp_pct: 49
    basis: "Пр/812-15, Пр/774-15"

  - label: "Сантехнические работы (внутренние)"
    match: ["внутренн водопровод", "внутренн канализац", "отоплени", "газоснабжен", "вентиляц", "кондиционирован", "трубопровод внутр", "радиатор", "стояк"]
    nr_pct: 121     # п.16
    sp_pct: 72
    basis: "Пр/812-16, Пр/774-16"

  - label: "Наружные сети (водопровод/канализация/теплоснабжение)"
    match: ["наружн сет", "наружн водопровод", "наружн канализац", "теплоснабжен наружн", "наружн газопровод"]
    nr_pct: 117     # п.18
    sp_pct: 74
    basis: "Пр/812-18, Пр/774-18"

  - label: "Теплоизоляционные работы"
    match: ["теплоизоляц", "утеплител", "утеплени", "изоляц труб"]
    nr_pct: 97      # п.20
    sp_pct: 55
    basis: "Пр/812-20, Пр/774-20"

  - label: "Автомобильные дороги"
    match: ["автомобильн дорог", "дорожн одежд", "асфальтобетон", "основание дорог"]
    nr_pct: 147     # п.21 (за искл. 21.1)
    sp_pct: 134
    basis: "Пр/812-21, Пр/774-21"

  - label: "Покрытия дорожек, тротуаров, площадок"
    match: ["тротуар", "дорожек", "мостов", "площадок", "благоустройств покрыт", "брусчатк"]
    nr_pct: 113     # п.21.1
    sp_pct: 77
    basis: "Пр/812-21.1, Пр/774-21.1"

  - label: "Линии электропередачи"
    match: ["линии электропередач", "лэп", "воздушн лини", "кабельн лини электро"]
    nr_pct: 103     # п.27
    sp_pct: 60
    basis: "Пр/812-27, Пр/774-27"

  - label: "Озеленение, защитные лесонасаждения"
    match: ["озеленени", "лесонасажден", "посадка деревь", "посадка кустарник", "газон"]
    nr_pct: 103     # п.41
    sp_pct: 72
    basis: "Пр/812-41, Пр/774-41"
