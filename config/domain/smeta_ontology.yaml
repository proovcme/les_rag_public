# Доменная онтология сметного дела РФ — источник истины для понимания ЛЕСом.
#
# ЗАЧЕМ: ЛЕС должен понимать ЧТО такое ВОР/КАЦ/ЛСР/КС, ЗАЧЕМ они и КАК выходят друг
# из друга. Это ЗНАНИЕ (факты+связи, которые меняются) → его место в редактируемом
# артефакте + RAG, а НЕ в весах модели (ADR-11/LLM-минимализм; не fine-tune/LoRA).
#
# Модель: концепт = узел; inputs/outputs = рёбра графа деривации.
#   kind: input | base | method | charge | coefficient | output | act
#   inputs:  из чего выходит (id вышестоящих концептов)
#   outputs: во что превращается / что питает (id нижестоящих)
#   classifier_type: связь с типом doc_classifier (если документ распознаётся)
version: 1

concepts:
  # ── Вход: задание и документация ──────────────────────────────
  - id: tz
    term: "ТЗ — техническое задание"
    kind: input
    aliases: ["техническое задание", "задание заказчика"]
    what: "Исходный документ заказчика: что построить, требования, состав и ориентир объёмов."
    why: "Отправная точка — на его основе разрабатывают РД и формируют смету."
    inputs: []
    outputs: [rd, lsr]

  - id: rd
    term: "РД — рабочая документация"
    kind: input
    aliases: ["рабочая документация", "рабочие чертежи"]
    what: "Чертежи и текстовые документы стадии «Р»: планы, спецификации, ведомости объёмов."
    why: "Источник натуральных объёмов работ и перечня материалов для сметы."
    inputs: [tz]
    outputs: [vor, spec]

  - id: vor
    term: "ВОР — ведомость объёмов работ"
    kind: input
    aliases: ["ведомость объёмов работ", "ведомость объемов работ", "boq", "бид-ведомость"]
    what: "Перечень работ с объёмами, единицами измерения и обоснованием расценки."
    why: "Натуральные объёмы СМР — прямой вход для оценки стоимости (ЛСР)."
    inputs: [rd, spec]
    outputs: [lsr]
    classifier_type: ведомость_объемов_работ

  - id: spec
    term: "Спецификация (ГОСТ 21.110)"
    kind: input
    aliases: ["спецификация оборудования, изделий и материалов", "спецификация"]
    what: "Комплектация: позиция / обозначение / наименование / количество / масса оборудования и материалов."
    why: "Перечень оборудования и материалов к закупке и к учёту в смете."
    inputs: [rd]
    outputs: [ved_mat, vor]
    classifier_type: спецификация

  - id: ved_mat
    term: "Ведомость материалов"
    kind: input
    aliases: ["ведомость оборудования и материалов"]
    what: "Материалы/изделия с количеством (и иногда поставщиком)."
    why: "Объёмы закупки и материальная часть позиций сметы."
    inputs: [spec]
    outputs: [lsr, kac]
    classifier_type: ведомость_материалов

  # ── Нормативные базы и цены ───────────────────────────────────
  - id: gesn
    term: "ГЭСН — государственные элементные сметные нормы"
    kind: base
    aliases: ["гэсн-2022", "элементные сметные нормы"]
    what: "Нормы расхода труда, машин и материалов на единицу работы (Приказ Минстроя 1046/пр)."
    why: "Норма раскрывает позицию на ресурсы — основа ресурсного и ресурсно-индексного метода."
    inputs: []
    outputs: [lsr]

  - id: fer_ter
    term: "ФЕР/ТЕР — единичные расценки"
    kind: base
    aliases: ["фер", "тер", "единичные расценки"]
    what: "Федеральные/территориальные расценки в рублях на единицу работы."
    why: "Готовая расценка для базисно-индексного метода (альтернатива раскрытию по ГЭСН)."
    inputs: []
    outputs: [lsr]

  - id: fsbc
    term: "ФСБЦ — федеральный сборник сметных цен"
    kind: base
    aliases: ["фсбц-2022", "фсбц", "сметные цены ресурсов"]
    what: "Базовые сметные цены ресурсов: материалы, эксплуатация машин, оплата труда."
    why: "Базовый уровень цен, который пересчитывается индексом до текущего."
    inputs: []
    outputs: [fgis_cs, lsr]

  - id: fgis_cs
    term: "ФГИС ЦС — система ценообразования (Сплит-форма)"
    kind: base
    aliases: ["фгис цс", "сплит-форма", "сплит форма", "фгисцс"]
    what: "Гос. система: сметные цены ресурсов и индексы пересчёта по региону и кварталу."
    why: "Текущие цены ресурсов и индексы — ядро ресурсно-индексного расчёта; lookup по коду ресурса."
    inputs: [fsbc]
    outputs: [lsr]

  - id: index
    term: "Индекс пересчёта"
    kind: coefficient
    aliases: ["индекс изменения сметной стоимости", "индекс к группе"]
    what: "Множитель базовой цены до текущего уровня по группе однородных ресурсов."
    why: "Переводит базисную стоимость в текущие цены отчётного квартала."
    inputs: []
    outputs: [lsr]

  # ── Методы расчёта ────────────────────────────────────────────
  - id: method_resource
    term: "Ресурсный метод"
    kind: method
    aliases: ["ресурсный"]
    what: "Стоимость = объём × текущие цены ресурсов (труд/машины/материалы) напрямую."
    why: "Точный метод; оформляется по форме Приложение 4 (Методика 421/пр)."
    inputs: []
    outputs: [lsr]

  - id: method_ri
    term: "Ресурсно-индексный метод"
    kind: method
    aliases: ["ресурсно-индексный", "рим"]
    what: "Базовые цены ресурсов × индексы ФГИС ЦС → текущая стоимость."
    why: "Основной метод по Методике 421/пр; результат — ЛСР, форма Приложение № 4 (Прил.3 — объектный расчёт)."
    inputs: [fgis_cs, index]
    outputs: [lsr]

  # ── Начисления ────────────────────────────────────────────────
  - id: nr
    term: "НР — накладные расходы"
    kind: charge
    aliases: ["накладные расходы"]
    what: "Косвенные затраты подрядчика, % от ФОТ по виду работ."
    why: "Норматив по Приказу Минстроя 812/пр; начисляется в каждой позиции ЛСР."
    inputs: []
    outputs: [lsr]
    basis: "Приказ Минстроя 812/пр"

  - id: sp
    term: "СП — сметная прибыль"
    kind: charge
    aliases: ["сметная прибыль"]
    what: "Плановая прибыль подрядчика, % от ФОТ."
    why: "Норматив по Приказу Минстроя 774/пр; начисляется после НР."
    inputs: []
    outputs: [lsr]
    basis: "Приказ Минстроя 774/пр"

  - id: kac
    term: "КАЦ — конъюнктурный анализ цен"
    kind: method
    aliases: ["конъюнктурный анализ цен", "конъюнктурный анализ", "коньюктурный анализ"]
    what: "Сбор КП от ≥3 поставщиков на материал и выбор экономичного варианта со ссылкой на источник."
    why: "Даёт цену материалов, которых НЕТ в ФГИС ЦС; обоснование рыночной стоимости в смете."
    inputs: [ved_mat]
    outputs: [lsr]
    basis: "Методика 421/пр (конъюнктурный анализ); ≥3 поставщика на каждый материал"

  # ── Лимитированные затраты и налоги ───────────────────────────
  - id: coef_stesn
    term: "Коэффициент на стеснённость"
    kind: coefficient
    aliases: ["стеснённость", "стесненность", "стеснённые условия"]
    what: "Повышающий коэффициент к ОЗП/ЭМ при стеснённых условиях производства работ."
    why: "Учитывает усложнение (городская застройка, действующее предприятие, МГН и т.п.)."
    inputs: []
    outputs: [lsr]

  - id: vzis
    term: "ВЗиС — временные здания и сооружения"
    kind: coefficient
    aliases: ["временные здания и сооружения"]
    what: "Лимитированные затраты на временные титульные здания/сооружения, % от СМР."
    why: "Включаются в сводный расчёт (Приказ 332/пр)."
    inputs: []
    outputs: [ssr]

  - id: winter
    term: "Зимнее удорожание"
    kind: coefficient
    aliases: ["зимние удорожания", "доп. затраты в зимнее время"]
    what: "Дополнительные затраты при производстве работ в зимний период, %."
    why: "Лимитированные затраты (Приказ 325/пр)."
    inputs: []
    outputs: [ssr]

  - id: contingency
    term: "Непредвиденные затраты"
    kind: coefficient
    aliases: ["резерв на непредвиденные", "непредвиденные работы"]
    what: "Резерв средств на непредвиденные работы и затраты, обычно ~2%."
    why: "Методика 421/пр, п.179."
    inputs: []
    outputs: [ssr]

  - id: vat
    term: "НДС — налог на добавленную стоимость"
    kind: coefficient
    aliases: ["ндс"]
    what: "Налог, % к итогу сметной стоимости."
    why: "Финальное начисление в сводном расчёте."
    inputs: []
    outputs: [ssr]

  # ── Выходные сметные документы ────────────────────────────────
  - id: lsr
    term: "ЛСР — локальный сметный расчёт (смета)"
    kind: output
    aliases: ["локальный сметный расчёт", "локальная смета", "смета"]
    what: "Смета по форме Минстроя 421/пр: позиции работ с ресурсами, НР, СП и итогами по разделам."
    why: "Базовый сметный документ — стоимость комплекса работ объекта/раздела."
    inputs: [vor, gesn, fgis_cs, method_ri, method_resource, nr, sp, kac, coef_stesn, ved_mat]
    outputs: [ssr, ks2]

  - id: ssr
    term: "ССР — сводный сметный расчёт"
    kind: output
    aliases: ["сводный сметный расчёт", "сводная смета"]
    what: "Свод всех ЛСР + лимитированные затраты + НДС → полная стоимость стройки."
    why: "Итоговая стоимость объекта капитального строительства."
    inputs: [lsr, vzis, winter, contingency, vat]
    outputs: []

  - id: ks2
    term: "КС-2 — акт о приёмке выполненных работ"
    kind: output
    aliases: ["кс-2", "кс2", "акт выполненных работ"]
    what: "Акт фактически выполненных объёмов работ за отчётный период."
    why: "Фиксирует выполнение для оплаты; сверяется с ВОР/сметой (план-факт)."
    inputs: [lsr]
    outputs: [ks3]

  - id: ks3
    term: "КС-3 — справка о стоимости работ"
    kind: output
    aliases: ["кс-3", "кс3", "справка о стоимости"]
    what: "Справка о стоимости выполненных работ и затрат за период."
    why: "Платёжный документ — денежный итог по КС-2."
    inputs: [ks2]
    outputs: []

  # ── Исполнительная документация ───────────────────────────────
  - id: aosr
    term: "АОСР — акт освидетельствования скрытых работ"
    kind: act
    aliases: ["акт освидетельствования скрытых работ", "аоср"]
    what: "Акт, подтверждающий скрытые работы перед их закрытием."
    why: "Часть исполнительной документации; основание для дальнейших работ."
    inputs: []
    outputs: [id_exec]

  - id: ozr
    term: "ОЖР — общий журнал работ"
    kind: act
    aliases: ["общий журнал работ", "журнал работ"]
    what: "Хронология производства работ с датами, объёмами и подписями."
    why: "Первичный учёт выполнения; основа исполнительной документации."
    inputs: []
    outputs: [id_exec]
    classifier_type: журнал

  - id: id_exec
    term: "ИД — исполнительная документация"
    kind: output
    aliases: ["исполнительная документация", "исполнителька"]
    what: "Комплект документов о фактически выполненных работах (АОСР, ОЖР, схемы, сертификаты)."
    why: "Подтверждает выполнение; сверяется со сметой и ВОР (план-факт)."
    inputs: [aosr, ozr]
    outputs: []
