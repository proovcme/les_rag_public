# Параметрические шаблоны объектов: фраза → состав работ + ОБЪЁМЫ (Ц16, капстоун).
#
# ИДЕЯ (ADR-11): числа — из ШАБЛОНА/НОРМ, не из LLM. Шаблон = типовой объект, разложенный
# на ключевые работы (реальные коды ГЭСН-2022) + ФОРМУЛЫ объёма от геометрических параметров.
# object_estimate_service подставляет параметры (S, N, P, …) → объёмы → lsr_assembly.assemble.
# LLM (если включён) только разбирает фразу и матчит шаблон; НИЧЕГО не считает.
#
# ── ГЕОМЕТРИЯ (честные допущения, без чертежа) ───────────────────────────────────────────
# Дано: S — общая площадь (м²), N — этажей. Выводим:
#   S1 = S / N                       — площадь застройки (пятно одного этажа), м²
#   a  = sqrt(S1)                    — сторона КВАДРАТНОГО пятна (ASSUME: дом ≈ квадрат в плане)
#   P  = 4 · a = 4 · sqrt(S/N)       — периметр одного этажа, м
#   H  = 3.0                         — высота этажа в свету, м (ASSUME: типовой потолок ИЖС)
# Все формулы — арифметика над {S, N, P, H, a, S1}; объёмы детерминированы и воспроизводимы.
#
# ── ФОРМУЛЫ (поле `qty_formula`, eval в безопасном неймспейсе {S,N,P,H,a,S1,sqrt,…}) ──────
# Единицы норм ГЭСН: «100 м2» / «100 м3» — поэтому объём ДЕЛИМ НА 100 (qty в сотнях единиц).
# Это контракт движка (норма даётся на 100 м²/м³). Коэффициенты (скат кровли, сечение
# фундамента, высота этажа) заданы явно в `geometry` и обоснованы ниже.
#
# ЧЕСТНО: коды взяты из реальной локальной базы (data/gesn_base/gesn2022.parquet, ~13.4k норм)
# и проверены get_norm() != None. Базовые нормы из parquet несут расход материалов (с ценой-
# снимком) и времён машин, но НЕ несут тариф ОЗП/ОТм → ОЗП в таких позициях = 0 до загрузки
# тарифов; смета всё равно собирается на том, что есть (материалы + машины + НР/СП от ФОТ).
# Код 12-01-034-02 продублирован в семени (gesn_seed.yaml) с полными тарифами → у него ОЗП != 0
# (эталонная бухгалтерия). Позиции без нормы помечаются TODO и в смету не идут.

version: 1

templates:
  - id: wooden_house
    name: "Деревянный дом (брус), типовой ИЖС"
    match:
      object: ["дом", "коттедж", "дача", "здание", "сруб"]
      material: ["дерев", "брус", "бревен", "бревён", "деревян"]
    # Геометрические константы шаблона (ASSUME — допущения без чертежа):
    geometry:
      H: 3.0              # ASSUME: высота этажа в свету 3.0 м (типовой ИЖС)
      roof_slope_k: 1.20  # ASSUME: площадь скатной кровли ≈ площадь застройки × 1.20
                          #         (двускатная ~30°: 1/cos(30°)≈1.155, +5% на свесы → 1.20)
      found_section: 0.30 # ASSUME: сечение ленты фундамента 0.30 м² (0.40 ш × 0.75 в) —
                          #         мелкозаглублённая лента под лёгкий деревянный дом

    positions:
      # 1. Фундамент — лента по периметру. Объём = P × сечение (м³), норма «100 м3».
      - code: "06-02-001-01"
        name: "Устройство бетонных фундаментов общего назначения (лента)"
        unit: "100 м3"
        qty_formula: "P * found_section / 100"        # м³ ленты / 100
        work_kind: "Бетонные и железобетонные монолитные конструкции"

      # 2. Стены из бруса 150 мм. Объём = площадь стен = P × H × N (м²), норма «100 м2».
      - code: "10-02-024-02"
        name: "Сборка стен из брусьев толщиной 150 мм"
        unit: "100 м2"
        qty_formula: "P * H * N / 100"                # м² стен / 100
        work_kind: "Деревянные конструкции"

      # 3. Перекрытия по балкам с дощатыми полами. Площадь ≈ S1 × N (N перекрытий:
      #    цоколь + межэтажные). Норма «100 м2».
      - code: "10-02-007-01"
        name: "Сборка цокольных перекрытий по балкам с дощатыми полами"
        unit: "100 м2"
        qty_formula: "S1 * N / 100"                   # м² перекрытий / 100
        work_kind: "Деревянные конструкции"

      # 4. Обрешётка под кровлю. Площадь = площадь кровли = S1 × roof_slope_k. Норма «100 м2».
      #    (есть и в семени — несёт полные тарифы → ОЗП != 0, эталонная бухгалтерия.)
      - code: "12-01-034-02"
        name: "Устройство обрешётки"
        unit: "100 м2"
        qty_formula: "S1 * roof_slope_k / 100"        # м² кровли / 100
        work_kind: "Кровли"

      # 5. Кровля из металлочерепицы по готовым прогонам. Площадь = площадь кровли. «100 м2».
      - code: "12-01-023-01"
        name: "Устройство кровли из металлочерепицы по готовым прогонам"
        unit: "100 м2"
        qty_formula: "S1 * roof_slope_k / 100"        # м² кровли / 100
        work_kind: "Кровли"

      # 6. Дощатые полы 28 мм. Площадь = S (вся жилая площадь всех этажей). Норма «100 м2».
      - code: "11-01-033-01"
        name: "Устройство покрытий дощатых толщиной 28 мм"
        unit: "100 м2"
        qty_formula: "S / 100"                         # м² полов / 100
        work_kind: "Полы"

      # 7. Утепление покрытия/перекрытия плитами. Площадь = площадь застройки S1. «100 м2».
      - code: "12-01-013-01"
        name: "Утепление покрытий плитами"
        unit: "100 м2"
        qty_formula: "S1 / 100"                        # м² утепления / 100
        work_kind: "Теплоизоляционные работы"

      # TODO: чистовая отделка / окна / двери / инженерные сети — отдельные сборники (15 отделка,
      #    10 проёмы, монтажные ГЭСНм для электрики/сантехники). Состав укрупнён до КОНСТРУКТИВА
      #    + теплоизоляции; расширяется добавлением позиций сюда (механика та же).

  # ── Офисное/административное здание (МОНОЛИТ) — плитный фундамент, плоская кровля ──────────
  # Ловит «здание/офис» когда материал НЕ назван (монолит по умолчанию). Деревянное здание
  # уйдёт в wooden_house (он первый в списке и ТРЕБУЕТ материал «дерево» → при «дереве» матчит
  # раньше). Коды — реальные ГЭСН-2022 из локальной базы (проверены get_norm != None); смета
  # собирается на расходе ресурсов + НР/СП (часть ОЗП/цен подтягивается ценовым слоем).
  - id: monolith_office
    name: "Офисное/административное здание (монолит), укрупнённо"
    match:
      object: ["офис", "офисн", "административн", "здание", "бизнес"]
    geometry:
      H: 3.3              # ASSUME: высота этажа офиса 3.3 м (типовой административный)
      found_slab_t: 0.40  # ASSUME: монолитная фундаментная плита 400 мм под всё пятно застройки
      roof_flat_k: 1.05   # ASSUME: плоская кровля ≈ площадь застройки × 1.05 (парапеты/примыкания)
      partition_k: 0.80   # ASSUME: перегородки ≈ 0.8 × площади этажа
    positions:
      # 1. Плитный фундамент — монолитная плита под всё пятно. Объём = S1 × толщина (м³), «100 м3».
      - code: "06-02-001-01"
        name: "Монолитная фундаментная плита (бетон общего назначения)"
        unit: "100 м3"
        qty_formula: "S1 * found_slab_t / 100"        # м³ плиты / 100
        work_kind: "Бетонные и железобетонные монолитные конструкции"

      # 2. Монолитные наружные стены/каркас. Площадь стен = P × H × N (м²), норма «10 м2».
      - code: "06-16-004-01"
        name: "Бетонирование монолитных наружных стен"
        unit: "10 м2"
        qty_formula: "P * H * N / 10"                 # м² стен / 10
        work_kind: "Бетонные и железобетонные монолитные конструкции"

      # 3. Монолитные перекрытия. Площадь = S1 × N (N перекрытий по числу этажей), «10 м2».
      - code: "06-16-005-01"
        name: "Бетонирование монолитных перекрытий"
        unit: "10 м2"
        qty_formula: "S1 * N / 10"                    # м² перекрытий / 10
        work_kind: "Бетонные и железобетонные монолитные конструкции"

      # 4. Перегородки из газобетона. Площадь ≈ S1 × N × partition_k (м²), норма «100 м2».
      - code: "08-04-003-02"
        name: "Перегородки из газобетонных блоков 100 мм"
        unit: "100 м2"
        qty_formula: "S1 * N * partition_k / 100"     # м² перегородок / 100
        work_kind: "Каменные конструкции"

      # 5. Плоская кровля — однослойный полимерный рулонный материал. Площадь = S1 × k, «100 м2».
      - code: "12-01-021-01"
        name: "Плоская кровля из полимерного рулонного материала (однослойная)"
        unit: "100 м2"
        qty_formula: "S1 * roof_flat_k / 100"         # м² кровли / 100
        work_kind: "Кровли"

      # TODO: чистовая отделка / фасад / окна / инженерные сети — отдельные сборники; состав
      #    укрупнён до КОНСТРУКТИВА + кровли, расширяется добавлением позиций (механика та же).
