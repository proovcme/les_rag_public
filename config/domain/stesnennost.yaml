# Коэффициенты к ОЗП (оплата труда рабочих) и ЭМ (эксплуатация машин) при усложняющих
# условиях производства работ (стеснённость и т.п.).
#
# ВАЖНО: это ЗНАНИЕ, которое меняется с редакцией норматива → живёт здесь (редактируемо,
# цитируемо), НЕ в коде/весах. Значения — ТИПОВЫЕ, по приложениям к Методике 421/пр
# (усложняющие факторы). ПЕРЕД применением сверить с действующей редакцией и проектными
# условиями: точный коэффициент зависит от конкретного фактора и может отличаться.
#
# Коэффициент применяется к ОЗП и нормам времени ЭМ (включая ЗПМ); материалы НЕ затрагиваются.
version: 1

conditions:
  - id: city_dense
    label: Стеснённые условия застроенной части города
    k_ozp: 1.15
    k_em: 1.15
    basis: "Методика 421/пр, прил. (усложняющие условия), типовое 1.15"
  - id: operating_plant
    label: Действующее предприятие / эксплуатируемые цеха
    k_ozp: 1.20
    k_em: 1.20
    basis: "Методика 421/пр, прил. (действующее производство), типовое 1.20"
  - id: occupied_building
    label: Эксплуатируемое здание (без остановки эксплуатации)
    k_ozp: 1.15
    k_em: 1.15
    basis: "Методика 421/пр, прил. (эксплуатируемые здания), типовое 1.15"
  - id: near_equipment
    label: Вблизи действующего оборудования / коммуникаций под напряжением
    k_ozp: 1.20
    k_em: 1.25
    basis: "Методика 421/пр, прил. (вблизи действующего оборудования), типовое 1.20/1.25"
  - id: heritage
    label: Объект культурного наследия (стеснённость + требования сохранности)
    k_ozp: 1.15
    k_em: 1.15
    basis: "Применять с условиями ОКН; коэффициент уточнять проектом/заданием"
