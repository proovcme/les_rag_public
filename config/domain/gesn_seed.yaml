# Каталог норм ГЭСН-2022 (расход ресурсов на единицу работы) — СЕМЯ.
#
# Норма = КОЛИЧЕСТВА ресурсов на единицу (трудозатраты чел-ч, время машин маш-ч, расход
# материалов). Цены берутся из ФГИС ЦС (по code) — кроме ОЗП/ОТм (тариф по разряду), которые
# идут как rate (price). Знание ≠ веса → редактируется здесь.
#
# Это СЕМЯ (демо-норма эталона). Полная база ГЭСН-2022 импортируется отдельно (как ФГИС ЦС),
# источник: https://fsnb2022.ru/gesn/ . Поля ресурса: kind (labor|machinist|machine|material),
# per_unit (на единицу нормы), code (для цены ФГИС ЦС), price (тариф ОЗП/ОТм; для машин/материалов —
# СНИМОК цены ФГИС ЦС на квартал, опционально — иначе цена резолвится по code из книги).

version: 1
norms:
  - code: ГЭСН12-01-034-02
    name: Устройство обрешётки с прозорами из брусков
    unit: 100 м2
    nr_pct: 109   # НР по виду работ «Кровли» (Приказ 812/пр) — норматив от ФОТ
    sp_pct: 57    # СП по виду работ «Кровли» (Приказ 774/пр) — норматив от ФОТ
    # ОЗП — рабочие (тариф по среднему разряду 2,5)
    resources:
      - { kind: labor,     name: "ОТ(ЗТ) средний разряд 2,5",      per_unit: 12.94, price: 475.11 }
      # Краны башенные 8 т + ОТм машинистов разряд 6
      - { kind: machine,   name: "Краны башенные, г/п 8 т",        code: "91.05.01-017", per_unit: 0.97, price: 865.44 }
      - { kind: machinist, name: "ОТм краны 8 т, разряд 6",        per_unit: 0.97, price: 750.17 }
      # Краны на автоходу 16 т + ОТм
      - { kind: machine,   name: "Краны на автомобильном ходу, 16 т", code: "91.05.05-015", per_unit: 0.01, price: 1663.18 }
      - { kind: machinist, name: "ОТм краны 16 т, разряд 6",       per_unit: 0.01, price: 750.17 }
      # Автомобили бортовые 5 т + ОТм разряд 4
      - { kind: machine,   name: "Автомобили бортовые, г/п до 5 т", code: "91.14.02-001", per_unit: 0.03, price: 627.61 }
      - { kind: machinist, name: "ОТм бортовые, разряд 4",         per_unit: 0.03, price: 558.46 }
      # Материал
      - { kind: material,  name: "Гвозди строительные",            code: "01.7.15.06-0111", per_unit: 0.0015, price: 91385.06 }
