name: windows-lite
platform: windows
service_manager: powershell
model_provider: openai_compatible
embedding_provider: remote
qdrant: remote_or_docker_named_volume
storage_root: "%ProgramData%\\LES"
ports:
  proxy: 8050
  ui: 8051
providers:
  lemonade:
    base_url: "http://127.0.0.1:13305/api/v1"
  ollama:
    base_url: "http://127.0.0.1:11434"
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
  openai:
    base_url: "https://api.openai.com/v1"
notes:
  - No local heavy model requirement.
  - Best first Windows profile for ARTEL/Revit testing.
  - Chat generation uses LES_LLM_PROVIDER and OpenAI-compatible chat completions.
