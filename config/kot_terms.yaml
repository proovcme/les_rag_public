      - "(?<![a-zа-я0-9])эм(?![a-zа-я0-9])"
      - "(?<![a-zа-я0-9])скс(?![a-zа-я0-9])"
      - "(?<![a-zа-я0-9])сс(?![a-zа-я0-9])"
