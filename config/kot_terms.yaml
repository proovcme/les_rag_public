version: 1
confidence:
  confident: 0.62
  ambiguous_gap: 0.12
domains:
  - id: NTD_FIRE
    label: fire_safety
    dataset_filter: NTD_FIRE
    terms:
      - эвакуац
      - пожар
      - огнестойк
      - противодым
      - спс
      - апс
      - сигнализац
      - 13130
      - 123-фз
      - 59638
      - аупт
      - соуэ
      - дымоудал
      - пб
      - пожаротушение
      - водяное пожаротушение
      - пенное пожаротушение
      - сервер
    patterns:
      - "(?<![a-zа-я0-9])апс(?![a-zа-я0-9])"
      - "(?<![a-zа-я0-9])спс(?![a-zа-я0-9])"
      - "(?<![a-zа-я0-9])соуэ(?![a-zа-я0-9])"
      - "(?<![a-zа-я0-9])аупт(?![a-zа-я0-9])"
    synonyms:
      пожарка: пожар
      противодымка: противодым
      аупт: автоматическая установка пожаротушения, пожаротушение водяное/пенное
      серверную: сервер, серверов, серверная, серверное, эвм, атс, вычислительный центр, вычислительных центров
      серверная: сервер, серверов, эвм, атс, вычислительный центр, вычислительных центров
      дымоудаление: противодымная вентиляция, противодымная защита, система вытяжной противодымной вентиляции
      огнестойкость: предел огнестойкости, огнестойкий, rei, ei
      эвакуация: эвакуационный выход, пути эвакуации, эвакуационный путь
      пожарный отсек: противопожарный отсек, пожарная секция
      огнезадерживающий: противопожарный клапан, огнезадерживающий клапан, нормально открытый клапан
      категория помещения: категория по взрывопожарной опасности, в1, в2, в3, в4
  - id: NTD_ELECTRICAL
    label: electrical
    dataset_filter: NTD_ELECTRICAL
    terms:
