norm_refs:
  - name: sp
    pattern: "\\bсп\\s*\\d+(?:\\.\\d+)*(?:-\\d+)?"
  - name: gost
    pattern: "\\bгост\\s*(?:р\\s*)?\\d+(?:[.-]\\d+)*"
  - name: pp87
    pattern: "\\b(?:пп|постановление)\\s*87\\b"
  - name: pue
    pattern: "\\bпуэ\\b"
