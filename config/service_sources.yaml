meta:
  version: 1
  title: "Служебные источники Л.Е.С."
  note: "Реестр файлов и датасетов, без которых сметные и нормоконтрольные workflow становятся неполными."

sources:
  - id: gesn_base
    domain: smeta
    label: "ГЭСН-2022: нормы и ресурсы"
    status_if_missing: blocking
    paths:
      - data/gesn_base/gesn2022.parquet
      - config/domain/gesn_seed.yaml
    accepted_files: ["*.parquet", "*.xlsx", "*.csv", "*.json", "*.pdf"]
    needed_for:
      - "ГЭСН-код → ресурсы"
      - "ЛСР от нормы"
      - "объектная прикидка"
    operator_hint: "Импортируй официальную базу ГЭСН/ФЕР/ТЕР через tools/gesn_import.py, tools/gesn_bulk_import.py или tools/gesn_pdf_import.py. Семя — только минимальный fallback."

  - id: fgis_price_base
    domain: smeta
    label: "ФГИС ЦС: Сплит-формы цен"
    status_if_missing: degraded
    paths:
      - data/price_base/*.parquet
    accepted_files: ["*.xlsx", "*.parquet"]
    needed_for:
      - "цены ресурсов по коду"
      - "ресурсно-индексный расчёт"
      - "понимание, нужен ли КАЦ"
    operator_hint: "Загрузи/обнови Сплит-форму субъекта и квартала в Инструменты → ФГИС ЦС. Query-time не ходит в интернет."

  - id: smeta_coefficients
    domain: smeta
    label: "Сметные коэффициенты и шаблоны"
    status_if_missing: blocking
    paths:
      - config/domain/nr_sp.yaml
      - config/domain/stesnennost.yaml
      - config/domain/object_templates.yaml
      - config/domain/smeta_ontology.yaml
    accepted_files: ["*.yaml"]
    needed_for:
      - "НР/СП"
      - "коэффициенты стеснённости"
      - "шаблоны объектной прикидки"
      - "сметная онтология"
    operator_hint: "Это управляемые конфиги ЛЕС: менять только через версию, тесты и release ledger."

  - id: normcontrol_spds_rulepack
    domain: normcontrol
    label: "СПДС rulepack: ГОСТ Р 21.101-2026"
    status_if_missing: blocking
    paths:
      - config/normcontrol/gost_r_21_101_2026.yaml
    accepted_files: ["*.yaml"]
    needed_for:
      - "doc-review"
      - "карта проверок нормоконтроля"
      - "defense claims по пунктам"
    operator_hint: "Rulepack — карта требований, не полный текст ГОСТ. Текст требований должен быть в нормативном RAG-датасете."

  - id: normcontrol_spds_rag
    domain: normcontrol
    label: "Нормативный RAG: СПДС/ГОСТ Р 21.101"
    status_if_missing: degraded
    dataset_query:
      domains: ["NTD_SPDS", "NTD_GENERAL"]
      name_contains: ["21.101", "СПДС", "SPDS"]
    accepted_files: ["*.pdf", "*.docx", "*.md", "*.txt"]
    needed_for:
      - "цитаты/текст требований"
      - "retrieval-подфаза doc-review"
      - "защита замечаний ссылками на норму"
    operator_hint: "Добавь легальный экземпляр ГОСТ/СПДС в нормативный датасет. Без него часть пунктов останется review_needed."

  - id: normcontrol_layout_reference
    domain: normcontrol
    label: "Layout-эталон СПДС: лист/рамка/основная надпись"
    status_if_missing: degraded
    paths:
      - config/normcontrol/layout_reference.yaml
    accepted_files: ["*.yaml", "*.pdf", "*.png"]
    needed_for:
      - "проверка расположения рамки"
      - "проверка зоны основной надписи"
      - "проверка заполнения граф"
    operator_hint: "Пока работает встроенный измерительный v1 по PDF-геометрии и зоне штампа. Для строгой проверки всех граф нужен эталонный layout_reference."
