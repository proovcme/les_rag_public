# Ведомость объёмов работ (ВОР). Жёсткой госформы нет — типовая структура (экспертиза/Гранд-Смета).
# Помимо этого бланка ВОР генерируется из данных: /api/bor/{id}/generate и /from-spec.
id: vor
title: Ведомость объёмов работ (ВОР)
legal_basis: Типовая форма ВОР (требования экспертизы); строится из спецификаций/чертежей
fields:
  - { key: object_name, label: Объект,                type: str, source: "project.name" }
  - { key: doc_code,    label: Шифр комплекта РД,     type: str, source: "manual" }
  - { key: date,        label: Дата,                   type: str, source: "date.today" }
columns:
  - "№ п/п"
  - "Наименование работ"
  - "Ед. изм."
  - "Количество"
  - "Обоснование (чертёж/спецификация)"
  - "Примечание"
table:
  mode: blank
  rows: 15
templates:
  xlsx: config/forms/templates/vor.xlsx
