services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: les-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - les-qdrant-data:/qdrant/storage
    networks:
      - les-net

  proxy:
    build:
      context: ../..
      dockerfile: Dockerfile.proxy
    container_name: les-proxy
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - ../../.env
    environment:
      QDRANT_URL: http://qdrant:6333
      MLX_URL: ${MLX_URL:-http://host.docker.internal:8080}
      TZ: ${TZ:-Europe/Moscow}
    ports:
      - "8050:8050"
    volumes:
      - ../../RAG_Content:/app/RAG_Content
      - ../../data:/app/data
      - ../../storage:/app/storage
      - ../../logs:/app/logs
    networks:
      - les-net

  ui:
    build:
      context: ../..
      dockerfile: Dockerfile.proxy
    container_name: les-ui
    restart: unless-stopped
    depends_on:
      - proxy
    env_file:
      - ../../.env
    environment:
      QDRANT_URL: http://qdrant:6333
      MLX_URL: ${MLX_URL:-http://host.docker.internal:8080}
      TZ: ${TZ:-Europe/Moscow}
    command: ["python", "sovushka_ng.py"]
    ports:
      - "8051:8051"
    volumes:
      - ../../RAG_Content:/app/RAG_Content
      - ../../data:/app/data
      - ../../storage:/app/storage
      - ../../logs:/app/logs
    networks:
      - les-net

networks:
  les-net:
    driver: bridge

volumes:
  les-qdrant-data:

