<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src http://127.0.0.1:* http://localhost:*; style-src 'self' 'unsafe-inline';" />
  <title>АРТЕЛЬ Фабрика семейств</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="brand">АРТЕЛЬ <span>Фабрика семейств</span></div>
    <nav>
      <button class="tab active" data-tab="specs">Спецификации</button>
      <button class="tab" data-tab="jobs">Задания</button>
      <button class="tab" data-tab="catalog">Каталог</button>
      <button class="tab" data-tab="settings">Настройки</button>
    </nav>
    <div class="status" id="backend-status">бэкенд…</div>
  </header>

  <main>
    <!-- Спецификации -->
    <section id="tab-specs" class="tabpane active">
      <div class="toolbar">
        <button id="btn-extract" class="primary">Извлечь из техлиста (PDF)</button>
        <button id="btn-refresh-specs">Обновить</button>
      </div>
      <div class="split">
        <ul id="spec-list" class="list"></ul>
        <div id="spec-detail" class="detail"><p class="muted">Выберите спецификацию слева.</p></div>
      </div>
    </section>

    <!-- Задания -->
    <section id="tab-jobs" class="tabpane">
      <div class="toolbar"><button id="btn-refresh-jobs">Обновить</button></div>
      <div class="split">
        <ul id="job-list" class="list"></ul>
        <div id="job-detail" class="detail"><p class="muted">Выберите задание слева.</p></div>
      </div>
    </section>

    <!-- Каталог -->
    <section id="tab-catalog" class="tabpane">
      <div class="toolbar">
        <input id="catalog-search" type="text" placeholder="Поиск по имени / категории / архетипу" />
        <button id="btn-refresh-catalog">Обновить</button>
      </div>
      <ul id="catalog-list" class="list"></ul>
    </section>

    <!-- Настройки -->
    <section id="tab-settings" class="tabpane">
      <label>Адрес бэкенда
        <input id="backend-url" type="text" value="http://127.0.0.1:5057" />
      </label>
      <p class="muted">Морда и Revit-плагин ходят в локальный бэкенд. ЛЕС/облако — опционально, в бэкенде.</p>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
