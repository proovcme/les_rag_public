services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: les-qdrant
    ports: ["6333:6333", "6334:6334"]
    volumes: ["./data/qdrant:/qdrant/storage"]
    networks: [les-net]
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: 1g

  proxy:
    build: {context: ., dockerfile: Dockerfile.proxy}
    container_name: les-proxy
    profiles: ["docker-proxy"]
    ports: ["8050:8050"]
    volumes:
      - ./backend:/app/backend
      - ./proxy:/app/proxy
      - ./proxy_server.py:/app/proxy_server.py
      - ./frontend:/app/frontend
      - ./RAG_Content:/app/RAG_Content
      - ./data:/app/data
      - ./storage:/app/storage
    env_file: [.env]
    environment:
      - MLX_URL=http://host.docker.internal:8080
      - QDRANT_URL=http://qdrant:6333
      - TZ=Europe/Moscow
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on: [qdrant]
    networks: [les-net]
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m

networks:
  les-net: {driver: bridge}
