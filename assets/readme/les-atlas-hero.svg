<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">LES and ATLAS CAD/BIM RAG overview</title>
  <desc id="desc">A dark technical banner showing CAD and BIM sources converted into cad_bim_graph JSON, indexed by LES and inspected in ATLAS.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07090c"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#07151a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#facc15"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="1280" height="520" fill="url(#bg)"/>
  <g opacity="0.13" stroke="#cbd5e1" stroke-width="1">
    <path d="M0 410H1280M0 360H1280M0 310H1280M0 260H1280M0 210H1280"/>
    <path d="M120 520V130M220 520V100M320 520V150M420 520V80M520 520V120M620 520V100M720 520V140M820 520V90M920 520V125M1020 520V105M1120 520V150"/>
  </g>
  <g filter="url(#soft)">
    <rect x="72" y="78" width="312" height="288" rx="24" fill="#101923" stroke="#294155"/>
    <rect x="430" y="62" width="430" height="320" rx="28" fill="#0d141c" stroke="#334155"/>
    <rect x="896" y="78" width="312" height="288" rx="24" fill="#101923" stroke="#294155"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="96" y="132" fill="#94a3b8" font-size="20">sources</text>
    <text x="96" y="178" fill="#f8fafc" font-size="38" font-weight="700">DWG / RVT / IFC</text>
    <text x="96" y="224" fill="#cbd5e1" font-size="24">lines, arcs, layers</text>
    <text x="96" y="260" fill="#cbd5e1" font-size="24">elements, psets, GUIDs</text>
    <text x="96" y="306" fill="#38bdf8" font-size="22">exporters + parser</text>
    <text x="464" y="124" fill="#facc15" font-size="22">canonical graph</text>
    <text x="464" y="178" fill="#f8fafc" font-size="38" font-weight="800">cad_bim_graph.json</text>
    <text x="464" y="236" fill="#cbd5e1" font-size="22">geometry + properties</text>
    <text x="464" y="270" fill="#cbd5e1" font-size="22">relations + stable anchors</text>
    <text x="464" y="338" fill="#38bdf8" font-size="22">LES index  |  ATLAS viewer</text>
    <text x="928" y="132" fill="#94a3b8" font-size="20">result</text>
    <text x="928" y="178" fill="#f8fafc" font-size="34" font-weight="800">Engineering RAG</text>
    <text x="928" y="224" fill="#cbd5e1" font-size="24">answers with object IDs</text>
    <text x="928" y="260" fill="#cbd5e1" font-size="24">viewer highlight</text>
    <text x="928" y="306" fill="#cbd5e1" font-size="24">local-first workflow</text>
  </g>
  <path d="M392 220C408 220 414 220 422 220" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M868 220C876 220 882 220 888 220" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="424" cy="220" r="9" fill="#facc15"/>
  <circle cx="892" cy="220" r="9" fill="#38bdf8"/>
  <g transform="translate(96 392)">
    <rect width="1088" height="56" rx="18" fill="#071016" stroke="#1f3444"/>
    <text x="28" y="36" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">LES public snapshot: source code, exporters, standalone viewer, schema and tests. No private corpora, secrets or deployment state.</text>
  </g>
</svg>
